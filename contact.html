<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Logan Nabozney</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://use.typekit.net/fgh8leq.css">
</head>
<body id="contactbody">


    <header class="minimal-header">
        <div class="logo">LN.</div>
        <div class="page-title">Contact</div>
        <nav class="intro-nav">
            <a href="index.html#fork-section">← Menu</a>
        </nav>
    </header>

    <main id="raw-contact-main">
        <h1 class="contact-title">Let's Talk.</h1>
        <p class="contact-intro">Have a project in mind, a question, or just want to say hello?</p>


        <form
          action="https://www.form-to-email.com/api/s/XIhtW0bqTY_X"
          method="POST"
          id="raw-form"
        >
          <label>Email address:
            <input type="email" name="email" required />
          </label>
          
          <label>Name:
            <input type="text" name="name" required />
          </label>
          
          <label>Message:
            <textarea name="message" required></textarea>
          </label>

          <button>Submit</button>
        </form>

        <div id="raw-socials">
            <a href="mailto:logannabozney@gmail.com">logannabozney@gmail.com</a>
            <a href="https://www.linkedin.com/in/logan-nabozney-621174322/" target="_blank">LinkedIn</a>
            <a href="https://instagram.com" target="_blank">Instagram</a>
        </div>
    </main>

</body>
</html>
